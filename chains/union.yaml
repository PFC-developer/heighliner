# Union
- name: union
  pre-build: |
    apt update
    wget https://github.com/unionlabs/union/releases/download/uniond%2Fv0.25.0/uniond.x86_64-linux.tar.gz
    tar xfz uniond.x86_64-linux.tar.gz
    mv result/bin/uniond /usr/bin
  binaries:
    - /usr/bin/uniond
  platforms:
    - linux/amd64

- name: unionX
  dockerfile: cargo
  github-organization: unionlabs
  github-repo: union
  platforms:
    - linux/amd64
  pre-build: |
    curl --proto '=https' --tlsv1.2 -sSf -L https://install.determinate.systems/nix | sh -s -- install linux --no-confirm --init none --extra-conf "sandbox = false"
  build-target: |
    export PATH="${PATH}:/nix/var/nix/profiles/default/bin"
    nix build .#uniond -L
  binaries:
    - /nix/store/*-uniond-${ARCH}-unknown-linux-musl/bin/uniond
