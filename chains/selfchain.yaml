# Selfchain
- name: selfchain
  pre-build: |
    apt update
    apt install -y unzip
    # https://github.com/selfchainxyz/Self-Chain-Releases/releases/?ref=blog.selfchain.xyz

    #    wget -O selfchaind-linux-amd64 "https://github.com/selfchainxyz/Self-Chain-Releases/releases/download/mainnet-v2.0.0/selfchaind-linux-amd64"
    wget -O selfchaind-linux-amd64 https://github.com/hotcrosscom/Self-Chain-Releases/releases/download/mainnet-v2.0.2/selfchaind-linux-amd64.2
    #    tar xfz selfchain-builds_v2.0.tar.gz
    mv selfchaind-linux-amd64 /usr/bin/selfchaind
    sha256sum /usr/bin/selfchaind
    chmod 755 /usr/bin/selfchaind
  binaries:
    - /usr/bin/selfchaind
      #  libraries:
      #    - /usr/lib/libwasmvm.x86_64.so
  platforms:
    - linux/amd64
